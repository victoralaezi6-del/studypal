<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyPal</title>
    <link rel="stylesheet" href="/afit studypal.css">
</head>
<body>

    <!-- FOR DESKTOP -->
    <!-- LEFT CONTAINER -->
    <div class="left_container">
        <header>
            <div class="header_text">
                <svg viewBox='0 0 24 24' width='3.5rem' height='3.5rem'><path fill="#F5F8FA" d="M12 6.90909C10.89995.50893 9.20406 4.10877 5.001194.00602C4.72513 3.99928 4.5 14.30344.5 16.597C4.5 16.8731 4.72515 17.09 5.00114 17.099C9.20405 17.2364 10.8999 19.0998 12 20.5M12 6.90909C13.1001 5.50893 14.7959 4.10877 18.9988 4.00602C19.2749 3.99928 19.5 4.21847 19.5
                                                                    4.49461C19.5 6.78447 19.5 14.3064 19.5 16.5963C19.5 16.8724 19.2749 17.09 18.9989 17.099C14.796 17.2364 13.1001 19.0998 12 20.5M12 6.90909L12 20.5" stroke="#000000" stroke-linejoin="round"/></svg>
                <h1 class="header_item">StudyPal</h1>
            </div>
        </header>

        <div class="sidebar_search_wrapper">
            <button type="button" id="sidebar_searchButton" class="sidebar_search_item"><svg viewBox='0 0 24 24' width='2rem' height='2rem'><path d='M15.5 14h-.791-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.55l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z' fill='#f5f8fa'></path></svg></button>
            <input type="search" id="sidebar_searchBar" placeholder="Search by course or keyword" class="sidebar_search_item" >
        </div>

        <div class="hamburger_button">
            <button type="button" id="hamburger">⇄</button>
        </div>

        <div class="mobile_hamburger">
            <button id="mobile_hamburger_item"><svg viewBox='0 0 24 24' width='3rem' height='2.5rem'><path fill='#f5f8fa' d='M3 5H21V7H3zM3 11H21V13H3zM3 17H21V19H3z'></path></svg></button>
        </div>

        <div class="navigations">
            <button type="button" class="nav_button" id="home"><svg viewBox = '0 0 24 24' width = '3rem' height='2.5rem'><path fill='#f5f8fa' d='M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z'/></svg> Home</button>
            <button type="button" class="nav_button" id="browsePDFs"><svg viewBox='0 0 24 24' width='3rem' height='2.5rem'><path fill='#f5f8fa' d='M3 5H21V7H3zM3 11H21V13H3zM3 17H21V19H3z'></path></svg> Browse</button>
            <button type="button" class="nav_button" id="profile"><svg viewBox='0 0 24 24' width='3rem' height='2.5rem'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z' fill='#f5f8fa'/></svg> Profile</button>
        </div>

        <div class="extra">
            <button id="logout" class="nav_button"><svg viewBox='0 0 24 24' width='3rem' height='2.5rem'><path d='M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z' fill='#f5f8fa'></path></svg> Logout</button>
        </div>

        <div class="mobile_navigations">
            <button class="nav_button" id="mobile_home">Home</button>
            <button class="nav_button" id="mobile_browsePDFs">Browse</button>
            <button class="nav_button" id="mobile_profile">Profile</button>
            <button class="nav_button" id="mobile_logout">Logout</button>
        </div>

        <div id="backdrop"></div>
    </div>

    <!-- RIGHT CONTAINER -->
    <div class="right_container">
       <div class="sub_right_container">
            <div id="greetings_div">
                <div id="greetings">
                    <!-- Javascript renders greetings - welcome + username -->
                </div>

                <div id="profile_letter_div">
                    <span id="profile_letter"></span>
                    <!-- Javascript renders only the first letter in an image form -->
                </div>
            </div>
            <!-- RANDOMLY SHOWN PDFS -->
            <p id="line"></p>
            <label for="randomly_shown">Showcase</label>
            <section id="randomly_shown" class="randomly_shown">
                <!-- Javascript renders random pdfs -->
                <div id="carousel"></div>
                <div class="carouselNav">
                    <button id="left">&lt;</button>
                    <button id="right">&gt;</button>
                </div>
            </section>

            <!-- OVERALL SITE PDFS IN CATEGORIES -->
            <label for="categories">Categorized</label>
            <section id="categories" class="categories">
                <!-- Javascript renders aetd downloaded pdfs -->
                <label for="aetd" class="categorized_shown">Aircraft Engineering (AETD)</label>
                <div id="aetd"></div>
                <div class="carouselNav">
                    <button id="aetdleft">&lt;</button>
                    <button id="aetdright">&gt;</button>
                </div>

                <label for="bam" class="categorized_shown">Business Administration (BAM)</label>
                <div id="bam"></div>
                <div class="carouselNav">
                    <button id="bamleft">&lt;</button>
                    <button id="bamright">&gt;</button>
                </div>

                <label for="civil" class="categorized_shown">Civil Engineering (CEED)</label>
                <div id="civil"></div>
                <div class="carouselNav">
                    <button id="civilleft">&lt;</button>
                    <button id="civilright">&gt;</button>
                </div>

                <label for="eed" class="categorized_shown">Electrical Engineering (EED)</label>
                <div id="eed"></div>
                <div class="carouselNav">
                    <button id="eedleft">&lt;</button>
                    <button id="eedright">&gt;</button>
                </div>

                <label for="maged" class="categorized_shown">Mechanical Engineering (MAGED)</label>
                <div id="maged"></div>
                <div class="carouselNav">
                    <button id="magedleft">&lt;</button>
                    <button id="magedright">&gt;</button>
                </div>
            </section>
        </div>
    </div>

    <!-- PROFILE CONTAINER -->
    <div class="profile_container">

        <div class="dashboard">
            <div id="message">
                <!-- Javascript renders greetings - random greetings + username -->
            </div>

            <div id="profile_letter_div">
                <span id="profile_letter2"></span>
                <!-- Javascript renders only the first letter in an image form -->
            </div>
        </div>

        <p id="line"></p>

        <div class="notices">
            <!-- TOP DASHBOARD -->
            <div class="notice_card">
                <label for="onlineStatus">Online Status</label>
                <div id="onlineStatus" class="notice">
                    <!-- Javascript renders online status -->
                </div>
            </div>

            <div class="notice_card">
                <label for="searched">Searched</label>
                <div id="searched" class="notice">
                    0 resources
                    <!-- Javascript renders in counts how many PDFs a user has searched -->
                </div>
            </div>

            <div class="notice_card">
                <label for="viewed">Viewed</label>
                <div id="viewed" class="notice">
                    0 resources
                    <!-- Javascript renders in count how many PDFs a user has downloaded -->
                </div>
            </div>

            <!-- BOTTOM DASHBOARD -->
            <div class="notice_card">
                <label for="streak">Matric Number</label>
                <div id="streak" class="notice">
                    <!-- Javascript renders in counts per 24hours. Starts when a user views a PDF and pauses when unviewed, resets after 24hours -->
                </div>
            </div>

            <div class="notice_card">
                <label for="rewards">Streak</label>
                <div id="rewards" class="notice">
                    <!-- Javascript renders rewards in counts per 2hours of streak -->
                </div>
            </div>

            <div class="notice_card">
                <label for="goPro">Rewards</label>
                <div id="goPro" class="notice">
                    <!-- Javascript renders emoji (good or bad), indicating if user has gone pro or not -->
                </div>
            </div>
        </div>
    </div>

    <!-- BROWSE CONTAINER -->
    <div class="browse_container">
        <div id="modal"><img id="viewer"></img>
        <button id="goBack">Back</button></div>
        <div class="course_container">
            <div id="courses">COURSES</div>
            <div class="mobile_search_wrapper">
                <button type="button" id="mobileSearchButton" class="mobile_search_item"><svg viewBox='0 0 24 24' width='2rem' height='2rem'><path d='M15.5 14h-.791-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.55l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z' fill='#f5f8fa'></path></svg></button>
                <input type="search" id="mobileSearchBar" placeholder="Search by course or keyword" class="mobile_search_item" >
            </div>
            <div id="list"></div>
            
        </div>
    </div>

    <div id="logout_animation">
        <div id="animation_coat">
            <div id="dotted_line"></div>
            <div id="dotted_line"></div>
            <div id="dotted_line"></div>
        </div>
    </div>

    <script src="AFIT StudyPal-Home.js"></script>
</body>
</html>
