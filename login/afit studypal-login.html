<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/afit Studypal.css">
    <title>StudyPal Login</title>
</head>
<body class="login-body">
    <form>
        <label for="firstName">Firstname</label>
        <input type="text" id="firstName" placeholder="  Precious" min="3" required>

        <label for="matricNumber">Matric Number</label>
        <input type="text" id="matricNumber" placeholder="  NUC00148" min="3" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="  *********" min="8" required>

        <button id="login-button" type="button">Login</button>

        
        <p id="Register">Don't have an account? <a href="/register/afit studypal-register.html">Register</a></p>
        <p id="goHome">Go home? <a href="/index.html">Home</a></p>

        <p id="login_message"></p>
        <p id="alert"></p>
        <p id="alert_message"></p>
        <p id="noAccount"></p>

        <p id="tagline">&copy;2025. Study smarter with StudyPal</p>
    </form>

    <div id="logout_animation">
        <div id="animation_coat">
            <div id="dotted_line"></div>
            <div id="dotted_line"></div>
            <div id="dotted_line"></div>
        </div>
    </div>
    <script src="afit studypal-login.js"></script>
</body>
</html>
